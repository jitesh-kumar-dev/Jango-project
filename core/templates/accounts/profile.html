{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}
Profile - Jitesh Store
{% endblock %}

{% block content %}

<section class="py-5 mt-5">

    <div class="container">

        <div class="row justify-content-center">

            <div class="col-lg-7">

                <div class="card shadow border-0 rounded-4">

                    <div class="card-body p-5">

                        <div class="text-center mb-4">

                            <h2 class="fw-bold">
                                My Profile
                            </h2>

                            <p class="text-muted">
                                Update your account details
                            </p>

                        </div>

                        <!-- Profile Form -->

                        <form method="POST">

                            {% csrf_token %}

                            {{ form|crispy }}

                            <div class="d-grid mt-4">

                                <button
                                    type="submit"
                                    class="btn btn-primary btn-lg"
                                >
                                    Update Profile
                                </button>

                            </div>

                        </form>

                    </div>

                </div>

            </div>

        </div>

    </div>

</section>

{% endblock %}
