{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}
Register - Jitesh Store
{% endblock %}

{% block content %}

<section class="py-5 mt-5">

    <div class="container">

        <div class="row justify-content-center">

            <div class="col-lg-6">

                <div class="card shadow border-0 rounded-4">

                    <div class="card-body p-5">

                        <div class="text-center mb-4">

                            <h2 class="fw-bold">
                                Create Account
                            </h2>

                            <p class="text-muted">
                                Join Jitesh Store today
                            </p>

                        </div>

                        <!-- Form -->

                        <form method="POST">

                            {% csrf_token %}

                            {{ form|crispy }}

                            <div class="d-grid mt-4">

                                <button
                                    type="submit"
                                    class="btn btn-primary btn-lg"
                                >
                                    Register
                                </button>

                            </div>

                        </form>

                        <!-- Login Link -->

                        <div class="text-center mt-4">

                            <p class="mb-0">

                                Already have an account?

                                <a href="{% url 'login' %}">
                                    Login
                                </a>

                            </p>

                        </div>

                    </div>

                </div>

            </div>

        </div>

    </div>

</section>

{% endblock %}
